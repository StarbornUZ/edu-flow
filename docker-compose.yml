# EduFlow — Docker Compose infra stack
#
# PORTLAR (barchasi bo'sh, standart portlardan farq qiladi):
#   PostgreSQL : localhost:15432  (standart 5432 band bo'lishi mumkin)
#   Redis      : localhost:16379  (standart 6379)
#   pgAdmin    : localhost:15050  (tools profili)
#   Mailpit    : localhost:15025  (tools profili) — SMTP: 11025
#   Flower     : localhost:15555  (workers profili)
#   Backend    : localhost:18000  (workers/app profili)
#
# FOYDALANISH:
#   make up            → faqat core infra (postgres + redis)
#   make up-tools      → core + pgAdmin + Mailpit
#   make up-workers    → core + workers (celery + flower)
#   make up-all        → hammasi
#   make down          → to'xtatish
#   make reset         → to'xtatish + volume larni o'chirish
#
# LOKAL TARMOQ:
#   make network       → tarmoq IP va ulanish yo'riqnomasini ko'rsatish

name: eduflow

# ============================================================
# Umumiy konfiguratsiya bloklari (YAML anchors)
# ============================================================
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &always-restart
  restart: unless-stopped

x-healthcheck-defaults: &hc-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

# ============================================================
# Tarmoq
# ============================================================
networks:
  eduflow_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================================
# Hajmlar (ma'lumotlar saqlanishi uchun)
# ============================================================
volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

# ============================================================
# Servislar
# ============================================================
services:

  # ----------------------------------------------------------
  # CORE: PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    <<: *always-restart
    image: postgres:16-alpine
    container_name: eduflow_postgres
    networks:
      - eduflow_net
    ports:
      - "15432:5432"           # host:container (0.0.0.0 bilan bind — tarmoqdan ham ko'rinadi)
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eduflow}
      POSTGRES_USER: ${POSTGRES_USER:-eduflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduflow_dev_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro   # ixtiyoriy init SQL
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduflow} -d ${POSTGRES_DB:-eduflow}"]
    logging: *default-logging

  # ----------------------------------------------------------
  # CORE: Redis 7
  # ----------------------------------------------------------
  redis:
    <<: *always-restart
    image: redis:7-alpine
    container_name: eduflow_redis
    networks:
      - eduflow_net
    ports:
      - "16379:6379"           # host:container
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-eduflow_redis_pass}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-eduflow_redis_pass}", "ping"]
    logging: *default-logging

  # ----------------------------------------------------------
  # TOOLS: pgAdmin 4  (make up-tools)
  # ----------------------------------------------------------
  pgadmin:
    <<: *always-restart
    image: dpage/pgadmin4:latest
    container_name: eduflow_pgadmin
    profiles: ["tools", "all"]
    networks:
      - eduflow_net
    ports:
      - "15050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@eduflow.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./scripts/pgadmin/servers.json:/pgadmin4/servers.json:ro   # avtomatik server sozlamalari
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ----------------------------------------------------------
  # TOOLS: Mailpit  (lokal SMTP + web UI)   (make up-tools)
  # ----------------------------------------------------------
  mailpit:
    <<: *always-restart
    image: axllent/mailpit:latest
    container_name: eduflow_mailpit
    profiles: ["tools", "all"]
    networks:
      - eduflow_net
    ports:
      - "15025:8025"   # web UI   → http://localhost:15025
      - "11025:1025"   # SMTP     → smtp://localhost:11025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    logging: *default-logging

  # ----------------------------------------------------------
  # WORKERS: Celery Worker  (make up-workers)
  # ----------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: eduflow_backend:latest
    container_name: eduflow_celery
    profiles: ["workers", "all"]
    networks:
      - eduflow_net
    command: >
      uv run celery
      -A backend.celery_app
      worker
      --loglevel=info
      --concurrency=2
      -Q celery,ai_tasks
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eduflow}:${POSTGRES_PASSWORD:-eduflow_dev_pass}@postgres:5432/${POSTGRES_DB:-eduflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-eduflow_redis_pass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *always-restart
    logging: *default-logging

  # ----------------------------------------------------------
  # WORKERS: Flower  (Celery monitoring)   (make up-workers)
  # ----------------------------------------------------------
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: eduflow_backend:latest
    container_name: eduflow_flower
    profiles: ["workers", "all"]
    networks:
      - eduflow_net
    ports:
      - "15555:5555"   # web UI → http://localhost:15555
    command: >
      uv run celery
      -A backend.celery_app
      flower
      --port=5555
      --broker=redis://:${REDIS_PASSWORD:-eduflow_redis_pass}@redis:6379
    env_file: .env
    depends_on:
      - celery_worker
    <<: *always-restart
    logging: *default-logging

  # ----------------------------------------------------------
  # APP: Backend API  (ixtiyoriy — odatda host da ishlaydi)
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: eduflow_backend:latest
    container_name: eduflow_backend
    profiles: ["app", "all"]
    networks:
      - eduflow_net
    ports:
      - "18000:8000"   # host:container
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eduflow}:${POSTGRES_PASSWORD:-eduflow_dev_pass}@postgres:5432/${POSTGRES_DB:-eduflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-eduflow_redis_pass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *always-restart
    logging: *default-logging
